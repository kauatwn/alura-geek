<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alura Geek</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Press+Start+2P&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles/styles.css" />
</head>

<body>
    <header>
        <div class="logo-item">
            <img src="assets/images/logo.png" alt="">
            <span>AluraGeek</span>
        </div>
    </header>

    <main>
        <section class="products-section">
            <h1>Meus produtos:</h1>
            <div class="product-card-list">

                <div class="product-card">
                    <img src="assets/images/stormtrooper.png" alt="">
                    <span>Stromtrooper</span>
                    <div class="product-details">
                        <span>$ 6,00</span>
                        <img src="assets/icons/icon_trash.svg" alt="">
                    </div>
                </div>

                <div class="product-card">
                    <img src="assets/images/game_boy_classic.png" alt="">
                    <span>Game Boy Classic</span>
                    <div class="product-details">
                        <span>$ 6,00</span>
                        <img src="assets/icons/icon_trash.svg" alt="">
                    </div>
                </div>
            </div>
        </section>

        <section>
            <form action="">
                <input type="text" placeholder="nome...">
                <input type="text" placeholder="valor...">
                <input type="text" placeholder="imagem...">
                <button>Guardar</button>
                <button>Limpar</button>
            </form>
        </section>
    </main>

    <footer>
        <div class="logo-item">
            <img src="assets/images/logo.png" alt="">
            <span>AluraGeek</span>
        </div>

        <p>Desenvolvido por Kauã</p>
        <p>Alura Latam - 2024</p>
    </footer>

</body>

</html>
